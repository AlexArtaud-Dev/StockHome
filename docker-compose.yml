services:
  api:
    image: ghcr.io/alexartaud-dev/stockhome-api:latest
    ports:
      - "${API_PORT:-4541}:3001"
    volumes:
      - stockhome_data:/app/data
    env_file:
      - stack.env
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - DB_PATH=/app/data/stockhome.db
      - UPLOAD_DIR=/app/data/uploads
      - PORT=3001
      - MAX_CONTAINER_DEPTH=${MAX_CONTAINER_DEPTH}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - FIRST_LAUNCH=${FIRST_LAUNCH}
      - APP_URL=${APP_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    restart: unless-stopped
    networks:
      - stockhome_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: ghcr.io/alexartaud-dev/stockhome-web:latest
    ports:
      - "${APP_PORT:-4540}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stockhome_net

volumes:
  stockhome_data:
    driver: local

networks:
  stockhome_net:
    driver: bridge
