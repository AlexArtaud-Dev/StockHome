server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name stockhome.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 50m;  # allow photo uploads

    # /api/ → API container (port 4541)
    location /api/ {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        # Forward cookies so httpOnly JWT auth works
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        set $upstream_app 192.168.1.11;
        set $upstream_port 4541;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    # /uploads/ → API container (port 4541)
    location /uploads/ {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        set $upstream_app 192.168.1.11;
        set $upstream_port 4541;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    # everything else → frontend (port 4540)
    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        set $upstream_app 192.168.1.11;
        set $upstream_port 4540;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
